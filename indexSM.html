<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mujeres- </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .product-card { border: none; }
        .carousel-item img {
            object-fit: cover;
            aspect-ratio: 3 / 4;
            background-color: #f8f9fa;
        }
        /* Las flechas solo aparecen al pasar el mouse sobre la tarjeta */
        .carousel-control-prev, .carousel-control-next { opacity: 0; transition: opacity 0.3s; }
        .card:hover .carousel-control-prev, .card:hover .carousel-control-next { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h6 class="text-uppercase mb-0 text-muted" style="font-size: 0.8rem;">Mujeres</h6>
            <h2 class="fw-bold m-0">CONJUNTOS A JUEGO</h2>
        </div>
        <a href="#" class="text-dark fw-bold text-decoration-none border-bottom border-dark">Ver Todo</a>
    </div>

    <div class="row row-cols-2 row-cols-md-4 g-4">

        <div class="col">
            <div class="card h-100 product-card position-relative">
                <div id="cr1" class="carousel slide" data-bs-interval="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active"><img src="Landing-page/Pictures/Mujeres/Gorra_1.jpeg" class="d-block w-100"></div>
                        <div class="carousel-item"><img src="Landing-page/Pictures/Mujeres/Gorra_2.jpeg" class="d-block w-100"></div>
                         <div class="carousel-item"><img src="Landing-page/Pictures/Mujeres/Gorra.jpeg" class="d-block w-100"></div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#cr1" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#cr1" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
                </div>
                <div class="card-body px-0 pt-2">
                    <h6 class="fw-bold mb-0">Gorra Deportiva</h6>
                    <p class="small text-muted mb-0">Beige Claro</p>
                    <p class="fw-bold mb-0">$46</p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card h-100 product-card">
                <img src="Landing-page/Pictures/Mujeres/Pantalon.jpeg" class="card-img-top">
                <div class="card-body px-0 pt-2">
                    <h6 class="fw-bold mb-0">Leggings Talle Alto</h6>
                    <p class="small text-muted mb-0">Azul Frío</p>
                    <p class="fw-bold mb-0">$60</p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card h-100 product-card position-relative">
                <div id="cr3" class="carousel slide" data-bs-interval="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active"><img src="Landing-page/Pictures/Mujeres/Short_1.jpeg" class="d-block w-100"></div>
                        <div class="carousel-item"><img src="Landing-page/Pictures/Mujeres/Short_2.jpeg" class="d-block w-100"></div>
                        <div class="carousel-item"><img src="Landing-page/Pictures/Mujeres/Short.jpeg" class="d-block w-100"></div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#cr3" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#cr3" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
                </div>
                <div class="card-body px-0 pt-2">
                    <h6 class="fw-bold mb-0">Shorts de Entrenamiento</h6>
                    <p class="small text-muted mb-0">Beige
                    <p class="fw-bold mb-0">$35</p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card h-100 product-card position-relative">
                <div id="cr4" class="carousel slide" data-bs-interval="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active"><img src="Landing-page/Pictures/Mujeres/Tennis_1.jpeg" class="d-block w-100"></div>
                        <div class="carousel-item"><img src="Landing-page/Pictures/Mujeres/Tennis_2.jpeg" class="d-block w-100"></div>
                        <div class="carousel-item"><img src="Landing-page/Pictures/Mujeres/Tennis.jpeg" class="d-block w-100"></div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#cr4" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#cr4" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
                </div>
                <div class="card-body px-0 pt-2">
                    <h6 class="fw-bold mb-0">Tenis Deportivos</h6>
                    <p class="small text-muted mb-0">Blanco / Negro</p>
                    <p class="fw-bold mb-0">$85</p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card h-100 product-card position-relative">
                <div id="cr5" class="carousel slide" data-bs-interval="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active"><img src="Landing-page/Pictures/Mujeres/Top_1.jpeg" class="d-block w-100"></div>
                        <div class="carousel-item"><img src="Landing-page/Pictures/Mujeres/Top_2.jpeg" class="d-block w-100"></div>
                        <div class="carousel-item"><img src="Landing-page/Pictures/Mujeres/Top.jpeg" class="d-block w-100"></div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#cr5" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#cr5" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
                </div>
                <div class="card-body px-0 pt-2">
                    <h6 class="fw-bold mb-0">Performance Top</h6>
                    <p class="small text-muted mb-0">verde</p>
                    <p class="fw-bold mb-0">$40</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
